<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic tags</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Student Portal</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <main>
        <form>
        <fieldset>
            <legend>Personal Information</legend>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
           
        </fieldset>
        <fieldset>
            <legend>Academic Information</legend>
            
                <label for="rollno">Roll Number:</label>
                <input type="text" id="rollno" name="rollno">
                <label for="department">Department:</label>
                <input type="text" id="department" name="department" required>
                <label for="course">Course:</label>
                <input type="text" id="course" name="course" required>
            
        </fieldset>
        <fieldset>
            
                <p>Skills</p>
                <input type="checkbox" id="html" name="Skills">
                <label for="html">HTML</label>
                <input type="checkbox" id="css" name="Skills">
                <label for="css">CSS</label>
                <input type="checkbox" id="js" name="Skills">
                <label for="js">JavaScript</label>
            
        </fieldset>
        <fieldset>
            
                <label for="about">About Yourself:</label>
                <textarea id="about" name="about" rows="4" cols="30"></textarea>
            
        </fieldset>

<section>
   
        <label for="uploadphoto">Upload Photo:</label>
        <input type="file" accept="image/*" id="uploadphoto" name="uploadphoto">
     
<input type="submit" value="Submit">
<input type="reset" value="Reset">

</section>
</form>
    </main>
<footer>
    <p>&copy; 2026 Student Portal. All rights reserved.</p>
</footer>

</body>

</html>
