<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="/submit" method="POST">
        <div>
            <label for="Rollnumber">Roll Number:</label>
            <input type="number" id="Rollnumber" name="Rollnumber" required>

        </div>
        <div>
            <label>Student Name:</label>
            <input type="text" name="Firstname" placeholder="Firstname" required>-
            <input type="text"  name="Lastname" placeholder="Lastname" required>
        </div>
        <div>
            <label for="Fathersname">Father's Name:</label>
            <input type="text" id="Fathersname" name="Fathersname" required>
        </div>
        <div>
            <label for="Mobilenumber">Mobile Number:</label>
            <input type="tel" id="Mobilenumber" name="Mobilenumber" required>
        </div>
        <div>
            <label for="Email">Email:</label>
            <input type="email" id="Email" name="Email" required>
            </div>
        <div>
            <label for="Password">Password:</label>
            <input type="password" id="Password" name="Password" required>
        </div>
        <div>
            <p>Gender:</p>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male:</label>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female:</label>
        </div>
<div>
   <p>
       Department:
</p>
    
    <input type="checkbox" id="cse" name="Department" required>
    <label for="cse">CSE</label>
    <input type="checkbox" id="it" name="Department" required>
    <label for="it">IT</label>
    <input type="checkbox" id="ece" name="Department" required>
    <label for="ece">ECE</label>
    <input type="checkbox" id="civil" name="Department" required>
    <label for="civil">CIVIL</label>
    <input type="checkbox" id="mech" name="Department" required>
    <label for="mech">MECH</label>
</div>
<div>
    <label for="course">Course:</label>
    <select id="course" name="course" required>
     
        <option value="btech">B.Tech</option>
        <option value="mtech">M.Tech</option>
        <option value="mba">MBA</option>
        <option value="msc">M.Sc</option>
    </select>
</div>
<div> 
<label for="Studentphoto">Student Photo:</label>
    <input type="file" id="Studentphoto" name="Studentphoto" accept="image/*" required>

</div>
<div>
    <label for="city">City:</label>
    <input type="text" id="city" name="city" required>

</div>
<div>
    <label for="address">Address:</label>
    <input type="text" id="address" name="address" required>
</div>
<div>
    <label for="Aboutyourself">About Yourself:</label><br>
    <textarea id="Aboutyourself" name="Aboutyourself" rows="4" cols="50"></textarea>
</div>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
    </form>
</body>
</html>
